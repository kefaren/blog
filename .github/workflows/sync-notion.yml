name: Sync Notion posts

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: notion-content-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Export published posts
        run: node scripts/sync-notion.mjs
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATA_SOURCE_ID: 3a3bd42f-8262-801f-9c1a-000b21107833

      - name: Commit content changes
        run: |
          if [ -z "$(git status --porcelain -- content/posts feed.json)" ]; then
            echo "No content changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/posts feed.json
          git commit -m "content: sync posts from Notion"
          git push
