<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notion Feed Widget — Demo</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      background: light-dark(#f4f2ed, #171715);
      color: light-dark(#1d1d1a, #f0eee8);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main { width: min(100% - 2.5rem, 720px); margin: clamp(4rem, 10vw, 8rem) auto; }
    header { margin-bottom: clamp(3rem, 8vw, 6rem); }
    h1 { margin: 0 0 1rem; max-width: 10ch; font-family: Georgia, serif; font-size: clamp(2.8rem, 8vw, 5.5rem); font-weight: 400; line-height: .94; letter-spacing: -.055em; }
    header p { max-width: 48ch; margin: 0; color: color-mix(in srgb, currentColor 60%, transparent); line-height: 1.65; }
    notion-post-feed { --nf-accent: #c05a38; }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Latest writing</h1>
      <p>A transparent, dependency-free feed, published from Notion through GitHub.</p>
    </header>
    <notion-post-feed source="./feed.json" limit="10" refresh="60"></notion-post-feed>
  </main>
  <script src="./notion-feed.js"></script>
</body>
</html>
